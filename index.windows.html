<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
  />
  <title>WordZ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe7;
      --bg-deep: #ebe5db;
      --panel: rgba(255, 251, 246, 0.96);
      --panel-solid: #fffaf3;
      --panel-soft: #f7f1e7;
      --line: rgba(88, 75, 55, 0.14);
      --line-strong: rgba(88, 75, 55, 0.22);
      --text: #182131;
      --text-strong: #0f172a;
      --text-soft: #24324a;
      --muted: #6b7788;
      --primary: #0f766e;
      --primary-strong: #115e59;
      --primary-soft: rgba(15, 118, 110, 0.12);
      --primary-soft-border: rgba(15, 118, 110, 0.22);
      --primary-text: #115e59;
      --button-gray: #455468;
      --button-gray-hover: #334155;
      --danger: #c2410c;
      --danger-hover: #9a3412;
      --chip-bg: rgba(255, 255, 255, 0.86);
      --chip-border: rgba(69, 84, 104, 0.18);
      --chip-text: #334155;
      --overlay: rgba(15, 23, 42, 0.46);
      --shadow: 0 20px 48px rgba(20, 24, 38, 0.09);
      --shadow-strong: 0 28px 72px rgba(20, 24, 38, 0.16);
      --button-shadow: 0 12px 26px rgba(15, 118, 110, 0.24);
      --button-gray-shadow: 0 10px 22px rgba(69, 84, 104, 0.14);
      --button-danger-shadow: 0 12px 26px rgba(194, 65, 12, 0.18);
      --disabled-bg: rgba(148, 163, 184, 0.6);
      --disabled-text: rgba(255, 255, 255, 0.82);
      --input-bg: rgba(255, 255, 255, 0.94);
      --table-bg: rgba(255, 255, 255, 0.92);
      --table-header-bg: #f2ebe1;
      --table-row-hover: #eef8f5;
      --radius: 18px;
      --app-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      --mono-font: "SFMono-Regular", "SF Mono", "JetBrains Mono", "Fira Code", "Cascadia Mono", "Menlo", "Consolas", monospace;
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #09111f;
      --bg-deep: #0d182b;
      --panel: rgba(16, 27, 45, 0.96);
      --panel-solid: #101b2d;
      --panel-soft: #132236;
      --line: rgba(148, 163, 184, 0.14);
      --line-strong: rgba(148, 163, 184, 0.24);
      --text: #e7eefb;
      --text-strong: #f8fbff;
      --text-soft: #d7e4f5;
      --muted: #94a3b8;
      --primary: #2dd4bf;
      --primary-strong: #14b8a6;
      --primary-soft: rgba(45, 212, 191, 0.16);
      --primary-soft-border: rgba(45, 212, 191, 0.24);
      --primary-text: #ccfbf1;
      --button-gray: #23324b;
      --button-gray-hover: #31445f;
      --danger: #f97316;
      --danger-hover: #ea580c;
      --chip-bg: rgba(16, 27, 45, 0.88);
      --chip-border: rgba(148, 163, 184, 0.18);
      --chip-text: #dbe6f6;
      --overlay: rgba(2, 6, 23, 0.72);
      --shadow: 0 24px 58px rgba(2, 6, 23, 0.42);
      --shadow-strong: 0 30px 78px rgba(2, 6, 23, 0.58);
      --button-shadow: 0 14px 30px rgba(20, 184, 166, 0.22);
      --button-gray-shadow: 0 12px 24px rgba(2, 6, 23, 0.34);
      --button-danger-shadow: 0 12px 26px rgba(249, 115, 22, 0.22);
      --disabled-bg: rgba(51, 65, 85, 0.88);
      --disabled-text: rgba(226, 232, 240, 0.76);
      --input-bg: rgba(16, 27, 44, 0.94);
      --table-bg: rgba(12, 23, 38, 0.94);
      --table-header-bg: #15263b;
      --table-row-hover: #10313f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body,
    button,
    input,
    select,
    textarea {
      font-family: var(--app-font-family);
    }

    body {
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    body.welcome-open {
      overflow: hidden;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      background: var(--table-bg);
      color: var(--text-soft);
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--table-header-bg);
      color: var(--text-strong);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
      background: var(--input-bg);
      color: var(--text);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }

    .hidden {
      display: none !important;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      max-width: 1480px;
      margin: 0 auto;
      padding: 18px 24px 24px;
    }

    .windows-safe-shell {
      display: grid;
      gap: 16px;
    }

    .welcome-overlay,
    .drop-import-overlay,
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--overlay);
      overflow: auto;
    }

    .welcome-overlay.hidden,
    .drop-import-overlay.hidden,
    .modal-overlay.hidden {
      display: none;
    }

    .welcome-panel,
    .drop-import-panel,
    .modal-panel {
      width: min(860px, calc(100vw - 32px));
      max-height: calc(100vh - 48px);
      overflow: auto;
      display: grid;
      gap: 16px;
      padding: 22px 24px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--panel-solid);
      box-shadow: var(--shadow-strong);
    }

    .drop-import-panel {
      width: min(620px, calc(100vw - 32px));
      text-align: center;
    }

    .drop-import-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-strong);
    }

    .drop-import-hint {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.7;
    }

    .welcome-header {
      display: grid;
      gap: 8px;
    }

    .welcome-kicker,
    .eyebrow,
    .welcome-card-label,
    .topbar-overview-label,
    .welcome-restore-label,
    .stats-readout-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--primary-text);
      font-family: var(--mono-font);
    }

    .welcome-kicker::before,
    .eyebrow::before {
      content: "";
      width: 24px;
      height: 1px;
      background: currentColor;
      opacity: 0.72;
    }

    .welcome-version,
    .topbar-version-badge {
      display: inline-flex;
      align-items: center;
      justify-self: start;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--primary-soft-border);
      background: var(--primary-soft);
      color: var(--primary-text);
      font-size: 12px;
      font-weight: 700;
    }

    .welcome-title {
      margin: 0;
      font-size: 32px;
      line-height: 1.08;
      color: var(--text-strong);
    }

    .welcome-subtitle,
    .panel-note,
    .subtitle,
    .section-note,
    .helper-text,
    .empty-tip {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .welcome-feature-grid,
    .control-grid,
    .status-grid,
    .stats-readout-grid {
      display: grid;
      gap: 14px;
    }

    .welcome-feature-grid {
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
    }

    .welcome-card,
    .topbar-overview-card,
    .stats-readout-card,
    .word-cloud-shell,
    .note-card,
    .progress-card {
      display: grid;
      gap: 10px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, var(--panel-solid) 0%, var(--panel-soft) 100%);
      box-shadow: var(--shadow);
    }

    .welcome-card-title,
    .topbar-overview-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-strong);
    }

    .welcome-card-note,
    .topbar-overview-note,
    .stats-readout-note {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.65;
    }

    .welcome-progress-block,
    .welcome-restore-prompt {
      display: grid;
      gap: 10px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel-soft);
      box-shadow: var(--shadow);
    }

    .welcome-progress-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--text-soft);
      font-size: 14px;
    }

    .welcome-progress-track {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(69, 84, 104, 0.16);
    }

    .welcome-progress-fill {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-strong) 100%);
    }

    .welcome-restore-title,
    .stats-readout-value {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-strong);
    }

    .welcome-restore-summary {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.7;
      white-space: pre-line;
    }

    .welcome-restore-actions,
    .welcome-actions,
    .status-row,
    .toolbar,
    .toolbar-left,
    .toolbar-right,
    .toolbar-actions-group,
    .topbar-actions-shell,
    .panel-header,
    .section-actions,
    .chip-row,
    .toggle-row,
    .welcome-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .welcome-actions {
      justify-content: space-between;
    }

    .welcome-checkbox,
    .toggle-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 600;
    }

    .welcome-checkbox input,
    .toggle-item input {
      width: auto;
      margin: 0;
      accent-color: var(--primary);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--chip-border);
      background: var(--chip-bg);
      color: var(--chip-text);
      font-size: 13px;
    }

    .chip.primary {
      background: var(--primary-soft);
      border-color: var(--primary-soft-border);
      color: var(--primary-text);
    }

    .topbar {
      display: grid;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92) 0%, var(--panel) 100%);
      box-shadow: var(--shadow);
    }

    body[data-theme="dark"] .topbar {
      background: linear-gradient(180deg, rgba(16, 27, 45, 0.94) 0%, var(--panel) 100%);
    }

    .topbar-headline-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 320px);
      gap: 16px;
      align-items: stretch;
    }

    .topbar-main,
    .topbar-brand-block {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .topbar-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar h1,
    .panel-header h2,
    .panel-header h3,
    .section-head h3 {
      margin: 0;
      color: var(--text-strong);
    }

    .topbar h1 {
      font-size: 22px;
      line-height: 1.1;
    }

    .toolbar-actions-group {
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.46);
    }

    body[data-theme="dark"] .toolbar-actions-group {
      background: rgba(16, 27, 45, 0.44);
    }

    .toolbar-actions-group.primary {
      justify-content: flex-start;
    }

    .toolbar-actions-group.secondary {
      justify-content: flex-end;
    }

    .menu-trigger {
      position: relative;
      padding-right: 36px;
    }

    .menu-trigger::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 50%;
      width: 8px;
      height: 8px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: translateY(-60%) rotate(45deg);
      opacity: 0.72;
      pointer-events: none;
    }

    .toolbar-menu-panel {
      position: relative;
      display: grid;
      gap: 12px;
      padding: 14px;
      margin-top: 2px;
      border-radius: 18px;
    }

    .button,
    .tab-button,
    .panel-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      border-radius: 14px;
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary-strong) 100%);
      color: #fff;
      font-size: 14px;
      padding: 11px 15px;
      cursor: pointer;
      box-shadow: var(--button-shadow);
      text-decoration: none;
    }

    .button:hover,
    .tab-button:hover,
    .panel-toggle:hover {
      opacity: 0.98;
      transform: translateY(-1px);
    }

    .button.gray,
    .panel-toggle {
      background: linear-gradient(180deg, var(--button-gray) 0%, var(--button-gray-hover) 100%);
      box-shadow: var(--button-gray-shadow);
    }

    .button.danger {
      background: linear-gradient(180deg, var(--danger) 0%, var(--danger-hover) 100%);
      box-shadow: var(--button-danger-shadow);
    }

    .button:disabled,
    .tab-button:disabled,
    .panel-toggle:disabled {
      background: var(--disabled-bg);
      color: var(--disabled-text);
      box-shadow: none;
      cursor: not-allowed;
    }

    .main-layout {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .sidebar,
    .content-stack,
    .stack-list {
      display: grid;
      gap: 16px;
    }

    .panel,
    .tab-shell,
    .task-center {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, var(--panel-soft) 100%);
    }

    body[data-theme="dark"] .panel-header {
      background: linear-gradient(180deg, rgba(16, 27, 45, 0.98) 0%, var(--panel-soft) 100%);
    }

    .panel-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .mono-readout {
      font-family: var(--mono-font);
      font-variant-numeric: tabular-nums;
    }

    .panel-body,
    .section {
      padding: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field > span:first-child {
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 600;
    }

    .control-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .status-grid {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .stats-readout-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .compare-summary-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .compare-summary-card {
      gap: 8px;
    }

    .compare-summary-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .stats-readout-card {
      padding: 14px 16px;
    }

    .table-scroll,
    .compact-table-scroll {
      max-height: 420px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--table-bg);
    }

    .compact-table-scroll {
      max-height: 220px;
    }

    .preview-box {
      height: 320px;
      margin: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--input-bg);
      color: var(--text-soft);
      line-height: 1.8;
      white-space: pre-wrap;
      overflow: auto;
    }

    .tab-strip,
    .tab-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .tab-button {
      border-color: var(--line);
      background: var(--panel-solid);
      color: var(--text-soft);
      box-shadow: none;
    }

    .tab-button.active {
      border-color: transparent;
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary-strong) 100%);
      color: #fff;
      box-shadow: var(--button-shadow);
    }

    .word-cloud-shell,
    .word-cloud-wrapper,
    .compare-summary-wrapper,
    .chi-guide-card {
      margin-top: 14px;
    }

    .word-cloud-wrapper {
      min-height: 160px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--table-bg);
    }

    .word-cloud-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      align-items: center;
      padding: 6px;
    }

    .word-cloud-item {
      border: none;
      background: transparent;
      padding: 4px 6px;
      color: var(--text-soft);
      cursor: pointer;
      line-height: 1.1;
      border-radius: 10px;
    }

    .word-cloud-item:hover {
      color: var(--primary);
      background: var(--primary-soft);
      transform: translateY(-1px);
    }

    .word-cloud-item.is-accent {
      color: var(--primary-strong);
    }

    .chi-square-result-grid,
    .chi-square-table-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 12px;
    }

    .chi-square-result-grid {
      border-bottom: 1px solid var(--line);
    }

    .chi-square-warning-list {
      display: grid;
      gap: 8px;
      margin: 0 12px 12px;
    }

    .chi-square-warning-item {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(245, 158, 11, 0.36);
      background: rgba(245, 158, 11, 0.1);
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.6;
    }

    .chi-guide-card {
      display: grid;
      gap: 10px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel-soft);
    }

    .chi-guide-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-strong);
    }

    .chi-guide-list {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 8px;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.65;
    }

    .chi-guide-note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .empty-tip {
      padding: 14px;
      border: 1px dashed var(--line-strong);
      border-radius: 14px;
      text-align: center;
    }

    .recent-open-list,
    .task-center-list,
    .stack-list {
      display: grid;
      gap: 10px;
      align-items: stretch;
    }

    .recent-open-empty,
    .task-center-empty {
      padding: 12px 10px;
      border: 1px dashed var(--line-strong);
      border-radius: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }

    .recent-open-item,
    .task-center-item {
      display: grid;
      gap: 8px;
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--panel-solid) 0%, var(--panel-soft) 100%);
      color: var(--text);
      text-align: left;
      box-shadow: var(--shadow);
    }

    .recent-open-item {
      cursor: pointer;
    }

    .recent-open-item-head,
    .task-center-item-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .recent-open-item-title,
    .task-center-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-strong);
    }

    .recent-open-item-detail,
    .task-center-detail,
    .task-center-item-meta,
    .task-center-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .recent-open-badge,
    .task-center-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--primary-soft-border);
      background: var(--primary-soft);
      color: var(--primary-text);
      font-size: 11px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .task-center-status.is-running {
      background: rgba(59, 130, 246, 0.14);
      border-color: rgba(59, 130, 246, 0.24);
      color: #1d4ed8;
    }

    .task-center-status.is-queued {
      background: rgba(245, 158, 11, 0.14);
      border-color: rgba(245, 158, 11, 0.24);
      color: #b45309;
    }

    .task-center-status.is-success {
      background: rgba(15, 118, 110, 0.14);
      border-color: rgba(15, 118, 110, 0.24);
      color: var(--primary-text);
    }

    .task-center-status.is-cancelled {
      background: rgba(148, 163, 184, 0.18);
      border-color: rgba(148, 163, 184, 0.26);
      color: var(--muted);
    }

    .task-center-status.is-failed {
      background: rgba(194, 65, 12, 0.14);
      border-color: rgba(194, 65, 12, 0.24);
      color: var(--danger);
    }

    .search-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin: 14px 0;
    }

    .search-query-group {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-soft);
    }

    .search-query-group .toggle-item {
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-solid);
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .table-render-status {
      position: sticky;
      top: 0;
      z-index: 3;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono-font);
      letter-spacing: 0.02em;
    }

    .table-render-status + table th {
      top: 38px;
    }

    .bootstrap-card {
      width: min(520px, calc(100vw - 32px));
      margin: 10vh auto 0;
      padding: 24px 26px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel-solid);
      box-shadow: var(--shadow-strong);
      text-align: left;
    }

    .bootstrap-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--primary-text);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-family: var(--mono-font);
    }

    .bootstrap-kicker::before {
      content: "";
      width: 24px;
      height: 1px;
      background: currentColor;
      opacity: 0.72;
    }

    .bootstrap-title {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.12;
      color: var(--text-strong);
    }

    .bootstrap-note {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.7;
    }

    body[data-wordz-windows-boot="safe-static"] {
      background: #f3f5f7;
      color: #1f2937;
    }

    body[data-wordz-windows-boot="safe-static"] .app-shell {
      max-width: 1380px;
    }

    body[data-wordz-windows-boot="safe-static"] .topbar,
    body[data-wordz-windows-boot="safe-static"] .panel,
    body[data-wordz-windows-boot="safe-static"] .task-center,
    body[data-wordz-windows-boot="safe-static"] .welcome-panel,
    body[data-wordz-windows-boot="safe-static"] .drop-import-panel,
    body[data-wordz-windows-boot="safe-static"] .modal-panel,
    body[data-wordz-windows-boot="safe-static"] .toolbar-menu-panel {
      background: #ffffff;
      border-color: rgba(15, 23, 42, 0.08);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
      backdrop-filter: none;
      border-radius: 14px;
    }

    body[data-wordz-windows-boot="safe-static"] .button,
    body[data-wordz-windows-boot="safe-static"] .tab-button,
    body[data-wordz-windows-boot="safe-static"] .chip {
      box-shadow: none;
      transition: none;
    }

    body[data-wordz-windows-boot="safe-static"] .topbar,
    body[data-wordz-windows-boot="safe-static"] .system-status,
    body[data-wordz-windows-boot="safe-static"] thead th {
      position: static;
      top: auto;
    }

    body[data-wordz-windows-boot="safe-static"] *,
    body[data-wordz-windows-boot="safe-static"] *::before,
    body[data-wordz-windows-boot="safe-static"] *::after {
      animation: none !important;
      transition: none !important;
      backdrop-filter: none !important;
    }

    @media (max-width: 1100px) {
      .topbar-headline-row,
      .main-layout,
      .welcome-feature-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .app-shell {
        padding: 14px;
      }

      .welcome-panel,
      .drop-import-panel,
      .modal-panel {
        padding: 18px;
      }

      .topbar,
      .panel-header,
      .section,
      .panel-body {
        padding-left: 14px;
        padding-right: 14px;
      }

      .welcome-title {
        font-size: 28px;
      }
    }
  </style>
</head>
<body data-wordz-windows-boot="safe-static">
  <div id="wordzBootstrapRoot">
    <div class="bootstrap-card">
      <div class="bootstrap-kicker">WordZ</div>
      <h1 class="bootstrap-title">正在准备界面</h1>
      <p class="bootstrap-note">Windows 版正在载入工作台，请稍候。</p>
    </div>
  </div>
  <script src="./renderer.js"></script>
</body>
</html>
