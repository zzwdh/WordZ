name: GitHub Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Release target
        required: true
        default: all
        type: choice
        options:
          - all
          - mac
          - win
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'

      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          release_tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "push" ] && [ "${GITHUB_REF_NAME}" != "${release_tag}" ]; then
            echo "::error::Git tag ${GITHUB_REF_NAME} 与 package.json 版本 ${version} 不一致。"
            exit 1
          fi

  release-mac:
    needs: prepare-release
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'mac'
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate branded build assets
        run: npm run build:assets

      - name: Run verification
        run: npm run verify:mac

      - name: Build macOS artifacts
        run: npm run native:mac:package

      - name: Verify macOS build artifacts
        run: npm run release:artifacts -- --target=mac

      - name: Publish macOS release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
        run: gh release upload "${{ needs.prepare-release.outputs.release_tag }}" dist-native/*.zip dist-native/*.dmg --clobber

  release-win:
    needs: prepare-release
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'win'
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate branded build assets
        run: npm run build:assets

      - name: Run verification
        run: npm run release:verify -- --target=win

      - name: Build Windows artifacts
        run: npm run dist:win

      - name: Verify Windows build artifacts
        run: npm run release:artifacts -- --target=win

      - name: Run packaged Windows smoke
        run: npm run test:packaged-smoke

      - name: Publish Windows release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORDZ_AUTO_UPDATE_GITHUB_OWNER: ${{ github.repository_owner }}
          WORDZ_AUTO_UPDATE_GITHUB_REPO: ${{ github.event.repository.name }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run release:github:win

  update-release-notes:
    needs:
      - prepare-release
      - release-mac
      - release-win
    if: |
      always() &&
      !cancelled() &&
      (needs.release-mac.result == 'success' || needs.release-mac.result == 'skipped') &&
      (needs.release-win.result == 'success' || needs.release-win.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'

      - name: Generate release notes
        run: node scripts/generate-release-notes.mjs --output build/release-notes.generated.md

      - name: Apply release notes to stable GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.prepare-release.outputs.release_tag }}" --notes-file build/release-notes.generated.md --latest
